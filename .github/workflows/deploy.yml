name: Deploy LearnSphere to AWS

on:
  push:
    branches: [main]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: learnsphere-be

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Build Docker image → Push ECR → Deploy lên EC2
  # ════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend (Docker → ECR → EC2)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🐳 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd LearnSphere_BE

          echo "Building Docker image..."
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          echo "Pushing to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_OUTPUT

      - name: 🖥️ SSH vào EC2 và deploy container mới
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            set -e

            echo "=== [1/4] Login vào ECR ==="
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            echo "=== [2/4] Pull image mới nhất ==="
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            echo "=== [3/4] Dừng container cũ (graceful) ==="
            docker stop learnsphere-be 2>/dev/null || true
            docker rm   learnsphere-be 2>/dev/null || true

            echo "=== [4/4] Chạy container mới ==="
            docker run -d \
              --name learnsphere-be \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file /home/ec2-user/.env \
              --log-driver awslogs \
              --log-opt awslogs-region=${{ env.AWS_REGION }} \
              --log-opt awslogs-group=/learnsphere/backend \
              --log-opt awslogs-stream=ec2-$(hostname) \
              ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            echo "=== Dọn dẹp image cũ ==="
            docker image prune -f

            echo "=== ✅ Backend deployed thành công ==="
            docker ps --filter name=learnsphere-be

  # ════════════════════════════════════════════════════════════
  # JOB 2: Build React app → Upload S3 → Invalidate CloudFront
  # ════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Deploy Frontend (Build → S3 → CloudFront)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: LearnSphere_FE/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd LearnSphere_FE
          npm ci

      - name: 🏗️ Build production bundle
        run: |
          cd LearnSphere_FE
          npm run build
        env:
          # URL API của EC2 backend — điền vào GitHub Secrets
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☁️ Sync build output lên S3
        run: |
          # Upload static assets với cache dài hạn (1 năm)
          aws s3 sync LearnSphere_FE/dist/ s3://${{ secrets.S3_FE_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html: KHÔNG cache — luôn phải lấy version mới nhất
          aws s3 cp LearnSphere_FE/dist/index.html \
            s3://${{ secrets.S3_FE_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: 🔄 Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_FE_DISTRIBUTION_ID }} \
            --paths "/*"

          echo "✅ Frontend deployed thành công!"
          echo "URL: https://$(aws cloudfront get-distribution \
            --id ${{ secrets.CLOUDFRONT_FE_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)"
